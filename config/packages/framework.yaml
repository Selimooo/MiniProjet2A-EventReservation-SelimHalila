framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: true
    handle_all_throwables: true

    # Sessions
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native

    # PHP files cache
    php_errors:
        log: true

    # Assets
    assets:
        enabled: true

    # Router
    router:
        utf8: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
