monolog:
    channels:
        - webauthn
        - jwt
        - security_app

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: '%kernel.logs_dir%/%kernel.environment%.log'
                level: debug
                channels: ['!event']
            console:
                type: console
                process_psr_3_messages: false
                channels: ['!event', '!doctrine', '!console']
            webauthn:
                type: stream
                path: '%kernel.logs_dir%/webauthn.log'
                level: debug
                channels: [webauthn]
            jwt:
                type: stream
                path: '%kernel.logs_dir%/jwt.log'
                level: info
                channels: [jwt]

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                buffer_size: 50
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            webauthn:
                type: stream
                path: '%kernel.logs_dir%/webauthn.log'
                level: info
                channels: [webauthn]
